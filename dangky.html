<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKH STORE - Đăng Ký Tài Khoản</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* --- KHỐI ĐĂNG KÝ CHÍNH --- */
        .register-container {
            background: white;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        /* Logo thương hiệu đồng bộ */
        .brand-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo a {
            font-size: 26px;
            font-weight: bold;
            color: #cc2424;
            text-decoration: none;
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* Khu vực nhập liệu */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #cc2424;
        }

        /* Điều khoản dịch vụ */
        .form-terms {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            margin: 20px 0;
            color: #666;
            line-height: 1.4;
        }

        .form-terms input {
            margin-top: 2px;
            cursor: pointer;
        }

        .form-terms a {
            color: #cc2424;
            text-decoration: none;
            font-weight: bold;
        }

        /* Nút Đăng ký */
        .btn-register {
            background-color: #ff9900; /* Dùng màu cam tạo sự khác biệt nhẹ với nút đăng nhập màu đỏ */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-register:hover {
            background-color: #e68a00;
        }

        /* Khu vực chuyển hướng ngược lại Đăng nhập */
        .redirect-login {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .redirect-login a {
            color: #cc2424;
            text-decoration: none;
            font-weight: bold;
        }

        .redirect-login a:hover {
            text-underline-offset: 2px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="brand-logo">
            <a href="trangchu.html">LKH STORE</a>
        </div>

        <h2>Đăng Ký Thành Viên Mới</h2>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" placeholder="Nhập họ và tên đầy đủ..." required>
            </div>

            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="reg-user" placeholder="Tạo tên tài khoản viết liền không dấu..." required>
            </div>

            <div class="form-group">
                <label>Địa chỉ Email</label>
                <input type="email" placeholder="Nhập email của bạn (Ví dụ: abc@gmail.com)..." required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-pass" placeholder="Tạo mật khẩu an toàn..." required>
            </div>

            <div class="form-group">
                <label>Xác nhận lại mật khẩu</label>
                <input type="password" id="reg-repass" placeholder="Nhập lại mật khẩu phía trên..." required>
            </div>

            <div class="form-terms">
                <input type="checkbox" id="agree-terms" required>
                <label for="agree-terms">Tôi đồng ý với tất cả các <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a> thông tin tại hệ thống cửa hàng LKH STORE.</label>
            </div>

            <button type="submit" class="btn-register">Đăng Ký Ngay</button>
        </form>

        <div class="redirect-login">
            Bạn đã có tài khoản rồi? <a href="dangnhap.html">Đăng nhập tại đây</a>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault(); // Chặn tải lại trang
            
            const username = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const repass = document.getElementById('reg-repass').value;

            // Kiểm tra khớp mật khẩu
            if (pass !== repass) {
                alert("Lỗi: Mật khẩu xác nhận lại không trùng khớp! Vui lòng kiểm tra kỹ.");
                return;
            }

            // Ghi nhận thành công giả lập
            alert(`Chúc mừng tài khoản [ ${username} ] đã được thiết lập thành công! Hãy thực hiện đăng nhập để trải nghiệm.`);
            window.location.href = "dangnhap.html"; // Tự động điều hướng sang trang đăng nhập ngay sau đó
        }
    </script>
</body>
</html>
