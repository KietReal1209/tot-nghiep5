<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKH STORE - Đăng Nhập</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- KHỐI ĐĂNG NHẬP CHÍNH --- */
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        /* Logo thương hiệu đồng bộ */
        .brand-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo a {
            font-size: 26px;
            font-weight: bold;
            color: #cc2424;
            text-decoration: none;
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* Khu vực nhập liệu */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #cc2424;
        }

        /* Tiện ích ghi nhớ & quên mật khẩu */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #666;
        }

        .form-options a {
            color: #cc2424;
            text-decoration: none;
            font-weight: bold;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        /* Nút Đăng nhập */
        .btn-login {
            background-color: #cc2424;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #b31f1f;
        }

        /* Khu vực chuyển hướng sang Đăng ký */
        .redirect-register {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .redirect-register a {
            color: #ff9900;
            text-decoration: none;
            font-weight: bold;
        }

        .redirect-register a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-logo">
            <a href="trangchu.html">LKH STORE</a>
        </div>

        <h2>Đăng Nhập Tài Khoản</h2>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Tên đăng nhập / Email</label>
                <input type="text" id="username" placeholder="Nhập tài khoản hoặc email..." required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu của bạn..." required>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox"> Ghi nhớ đăng nhập
                </label>
                <a href="quenmatkhau.html">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-login">Đăng Nhập</button>
        </form>

        <div class="redirect-register">
            Bạn chưa có tài khoản? <a href="dangky.html">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Ngăn chặn tải lại trang mặc định
            
            const user = document.getElementById('username').value.trim();
            
            // Thông báo thành công và chuyển hướng về trang chủ
            alert(`Đăng nhập thành công! Chào mừng ${user} đến với LKH STORE.`);
            window.location.href = "trangchu.html";
        }
    </script>
</body>
</html>
